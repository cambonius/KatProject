<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timestamp Logger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .row {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    button {
      padding: 12px 18px;
      min-width: 56px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #f3f3f3;
      cursor: pointer;
      font-size: 16px;
      touch-action: manipulation;
    }

    button:hover {
      background-color: #e0e0e0;
    }

    .name-selected {
      background-color: #cce5ff;
      border-color: #80bdff;
    }

    /* Timeline styles */
    #timelineContainer {
      margin-top: 20px;
    }

    #timelineLabel {
      text-align: center;
      margin-bottom: 6px;
      font-weight: bold;
    }

    #timeline {
      border-top: 1px solid #ddd;
      padding-top: 12px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      min-height: 80px;
      padding-bottom: 8px;
    }

    .timeline-event {
      flex-shrink: 0;
      min-width: 90px;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background-color: #fafafa;
      text-align: center;
      font-size: 13px;
    }

    .timeline-event-main {
      font-weight: bold;
      margin-bottom: 2px;
    }

    .timeline-event-time {
      font-size: 11px;
      color: #666;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    /* Section title used for the Names/Numbers headings */
    .section-title {
      text-align: center;
      width: 100%;
      margin-top: 8px;
      font-size: 18px;
    }

    /* Improved touch targets and inline-edit styles for iPad */
    .name-wrapper,
    .number-wrapper {
      display: inline-flex;
      flex-direction: column;
      /* stack vertically */
      align-items: center;
      gap: 6px;
      min-width: 64px;
      /* keeps consistent column width */
    }

    .name-btn,
    .number-btn {
      padding: 12px 18px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #f3f3f3;
      cursor: pointer;
      font-size: 16px;
      touch-action: manipulation;
      box-sizing: border-box;
    }

    .edit-btn {
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      width: 100%;
      /* span under the name button */
      box-sizing: border-box;
      margin-top: 4px;
      /* small separation under the name */
    }

    .name-input,
    .number-input {
      padding: 10px 12px;
      min-width: 80px;
      border: 1px solid #8ab4ff;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      box-sizing: border-box;
      width: 100%;
    }

    /* larger touch targets on coarse pointers (tablets / iPad) */
    @media (pointer: coarse) {
      .name-btn,
      .number-btn,
      .edit-btn,
      .name-input,
      .number-input {
        padding: 16px 20px;
        font-size: 18px;
      }

      button {
        min-width: 68px;
      }
    }
  </style>
</head>

<body>
  <h1 style="text-align: center;">Timestamp Logger</h1>
  <p style="text-align: center;">
    Click a <strong>Name</strong> button, then a <strong>Number</strong> button.
    Logs appear in the format: <code>[Name][Number] - 7:42:15 PM</code>
  </p>

  <!-- Top row: name buttons -->
  <div class="section-title"><strong>Names</strong></div>
  <div id="nameRow" class="row"></div>

  <!-- Second row: number buttons -->
  <div class="section-title"><strong>Numbers</strong></div>
  <div id="numberRow" class="row"></div>

  <!-- Horizontal timeline -->
  <div id="timelineContainer">
    <div id="timelineLabel">Timeline</div>
    <div id="timeline"></div>
  </div>

  <div class="controls">
    <button id="downloadBtn">Download log.txt</button>
    <button id="clearBtn">Clear log</button>
  </div>

  <script>
    // --- Data sets ---
    const STORAGE_KEY = 'kat_names_v1';
    const STORAGE_KEY_NUMBERS = 'kat_numbers_v1';
    const DEFAULT_NAMES = [
      "Jack", "Emily", "Michael", "Sarah", "David",
      "Jessica", "Daniel", "Ashley", "Matthew"
    ];

    const DEFAULT_NUMBER_LABELS = Array.from({ length: 13 }, (_, i) => String(i + 1)); // 1–13

    function loadNames() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return DEFAULT_NAMES.slice();
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.every(n => typeof n === 'string')) {
          return parsed;
        }
      } catch (e) { /* fall through to defaults */ }
      return DEFAULT_NAMES.slice();
    }

    function saveNames() {
      const names = Array.from(document.querySelectorAll('#nameRow .name-btn'))
        .map(b => b.dataset.name);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(names));
    }

    function loadNumbers() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY_NUMBERS);
        if (!raw) return DEFAULT_NUMBER_LABELS.slice();
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.every(n => typeof n === 'string')) {
          return parsed;
        }
      } catch (e) { /* fall through to defaults */ }
      return DEFAULT_NUMBER_LABELS.slice();
    }

    function saveNumbers() {
      const values = Array.from(document.querySelectorAll('#numberRow .number-btn'))
        .map(b => b.dataset.value);
      localStorage.setItem(STORAGE_KEY_NUMBERS, JSON.stringify(values));
    }

    const NAMES = loadNames();

    const NUMBER_LABELS = loadNumbers();

    // Now we store structured entries: { combo, time }
    const logEntries = [];
    let selectedName = null;

    const nameRow = document.getElementById("nameRow");
    const numberRow = document.getElementById("numberRow");
    const downloadBtn = document.getElementById("downloadBtn");
    const clearBtn = document.getElementById("clearBtn");
    const timeline = document.getElementById("timeline");

    // --- Helper: render the horizontal timeline ---
    function refreshTimeline() {
      timeline.innerHTML = "";

      logEntries.forEach(entry => {
        const eventDiv = document.createElement("div");
        eventDiv.className = "timeline-event";

        const mainLine = document.createElement("div");
        mainLine.className = "timeline-event-main";
        mainLine.textContent = entry.combo; // e.g., Jack12

        const timeLine = document.createElement("div");
        timeLine.className = "timeline-event-time";
        timeLine.textContent = entry.time; // e.g., 7:42:15 PM

        eventDiv.appendChild(mainLine);
        eventDiv.appendChild(timeLine);
        timeline.appendChild(eventDiv);
      });

      if (timeline.scrollWidth > timeline.clientWidth) {
        timeline.scrollLeft = timeline.scrollWidth;
      }
    }

    // --- Format time as 12-hour AM/PM ---
    function get12HourTime() {
      const now = new Date();
      let hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const ampm = hours >= 12 ? "PM" : "AM";

      hours = hours % 12;
      if (hours === 0) hours = 12;

      return `${hours}:${minutes}:${seconds} ${ampm}`;
    }

    // --- Create name buttons (touch-friendly + inline edit) ---
    function selectNameButton(btn) {
      selectedName = btn.dataset.name;
      document.querySelectorAll("#nameRow .name-btn").forEach(b => b.classList.remove("name-selected"));
      btn.classList.add("name-selected");
    }

    function startInlineEdit(wrapper, btn, opts) {
      const datasetKey = opts.datasetKey;
      const inputClass = opts.inputClass;
      const onUpdated = opts.onUpdated;

      const current = btn.dataset[datasetKey];
      const input = document.createElement("input");
      input.type = "text";
      input.className = inputClass;
      input.value = current;
      wrapper.replaceChild(input, btn);
      input.focus();
      input.select();

      let finished = false;

      function finish(save) {
        if (finished) return;
        finished = true;

        let updated = false;
        if (save) {
          const v = input.value.trim();
          if (v) {
            btn.dataset[datasetKey] = v;
            btn.textContent = v;
            updated = true;
          }
        }

        if (input.parentNode === wrapper) {
          wrapper.replaceChild(btn, input);
        } else if (!wrapper.contains(btn)) {
          wrapper.appendChild(btn);
        }

        if (updated && typeof onUpdated === 'function') {
          onUpdated();
        }

        if (btn.classList.contains("name-selected")) {
          selectedName = btn.dataset.name;
        }

        input.removeEventListener("blur", onBlur);
        input.removeEventListener("keydown", onKey);
      }

      const onBlur = () => finish(true);
      const onKey = (e) => {
        if (e.key === "Enter") finish(true);
        if (e.key === "Escape") finish(false);
      };

      input.addEventListener("blur", onBlur);
      input.addEventListener("keydown", onKey);
    }

    function createNameControl(name) {
      const wrapper = document.createElement("div");
      wrapper.className = "name-wrapper";

      const btn = document.createElement("button");
      btn.className = "name-btn";
      btn.textContent = name;
      btn.dataset.name = name;

      btn.addEventListener("click", () => selectNameButton(btn));

      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";
      editBtn.type = "button";
      editBtn.setAttribute("aria-label", "Edit name");
      editBtn.textContent = "✏️";

      // stop click from selecting name; open inline editor instead
      editBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        startInlineEdit(wrapper, btn, {
          datasetKey: 'name',
          inputClass: 'name-input',
          onUpdated: saveNames,
        });
      });

      wrapper.appendChild(btn);
      wrapper.appendChild(editBtn);
      nameRow.appendChild(wrapper);
    }

    // initialize name controls
    NAMES.forEach(createNameControl);
    // ensure initial state is saved (in case defaults are used)
    saveNames();

    // --- Create number buttons (with inline edit) ---
    function createNumberControl(label) {
      const wrapper = document.createElement("div");
      wrapper.className = "number-wrapper";

      const btn = document.createElement("button");
      btn.className = "number-btn";
      btn.textContent = label;
      btn.dataset.value = label;

      btn.addEventListener("click", () => {
        if (!selectedName) {
          alert("Please select a name first.");
          return;
        }

        const value = btn.dataset.value;
        const combo = `${selectedName}${value}`; // e.g., Jack12 (or JackA)
        const time = get12HourTime();

        logEntries.push({ combo, time });
        refreshTimeline();
        console.log("Logged:", combo, "-", time);
      });

      const editBtn = document.createElement("button");
      editBtn.className = "edit-btn";
      editBtn.type = "button";
      editBtn.setAttribute("aria-label", "Edit number label");
      editBtn.textContent = "✏️";

      editBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        startInlineEdit(wrapper, btn, {
          datasetKey: 'value',
          inputClass: 'number-input',
          onUpdated: saveNumbers,
        });
      });

      wrapper.appendChild(btn);
      wrapper.appendChild(editBtn);
      numberRow.appendChild(wrapper);
    }

    NUMBER_LABELS.forEach(createNumberControl);
    saveNumbers();

    // --- Download log as log.txt ---
    downloadBtn.addEventListener("click", () => {
      if (logEntries.length === 0) {
        alert("No logs to download yet.");
        return;
      }

      const text = logEntries
        .map(entry => `${entry.combo} - ${entry.time}`)
        .join("\n");

      const blob = new Blob([text], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "log.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    // --- Clear log & timeline ---
    clearBtn.addEventListener("click", () => {
      if (!confirm("Clear all log entries?")) return;
      logEntries.length = 0;
      refreshTimeline();
    });

    // --- Clear storage and reload (for reset) ---
    function resetApp() {
      if (confirm("Reset app to default names and numbers?")) {
        localStorage.removeItem('kat_names_v1');
        localStorage.removeItem('kat_numbers_v1');
        location.reload();
      }
    }

    // Add a reset button (for demo purposes)
    const resetBtn = document.createElement("button");
    resetBtn.textContent = "Reset to Defaults";
    resetBtn.style.marginTop = "10px";
    resetBtn.addEventListener("click", resetApp);
    document.body.appendChild(resetBtn);
  </script>
</body>

</html>
